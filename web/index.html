<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Piano Fall</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #piano-fall { width: 1200px; height: 800px; position: relative; }
        #piano-fall canvas { width: 100%; height: 100%; display: block; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            z-index: 10; cursor: pointer;
        }
        #overlay span { color: #4af; font-family: sans-serif; font-size: 24px; }
    </style>
</head>
<body>
    <div id="overlay"><span>Click to Start</span></div>
    <div id="piano-fall"></div>
    <script type="module">
        import init from './pkg/piano_fall.js';
        await init();
        document.getElementById('overlay').addEventListener('click', function() {
            this.style.display = 'none';
        });
    </script>
</body>
</html>
